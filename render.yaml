services:
  - type: web
    name: orivon-backend
    runtime: python
    rootDir: backend
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: CORS_ORIGINS
        sync: false

