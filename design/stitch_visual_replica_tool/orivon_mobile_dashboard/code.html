<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orivon Mobile Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts-and-utilities">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #e5e7eb; /* Darker bg to frame the mobile view */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .mobile-container {
      width: 100%;
      max-width: 390px; /* iPhone 14 Pro width approx */
      height: 844px; /* iPhone 14 Pro height approx */
      background-color: #fcfcfd;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      border-radius: 40px; /* Simulate phone screen */
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border: 8px solid #000;
    }
    /* Hide scrollbar for a cleaner mobile app look */
    .mobile-container::-webkit-scrollbar {
      display: none;
    }
    .mobile-container {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .gradient-text {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
<!-- BEGIN: Mobile App Container -->
<div class="mobile-container relative pb-24">
<!-- BEGIN: iOS Status Bar Simulation -->
<div class="flex justify-between items-center px-6 py-3 text-[13px] font-semibold text-gray-900 sticky top-0 z-50 bg-[#fcfcfd]/90 backdrop-blur-md">
<div>9:41</div>
<div class="flex items-center gap-1.5">
<!-- Cellular -->
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M4 18h2v2H4zm4-4h2v6H8zm4-4h2v10h-2zm4-4h2v14h-2zm4-4h2v18h-2z"></path></svg>
<!-- Wifi -->
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M12 4C7.31 4 3.07 5.9 0 8.98l12 15 12-15c-3.07-3.08-7.31-4.98-12-4.98zM2.92 9.07C5.51 7.08 8.67 6 12 6s6.49 1.08 9.08 3.07l-9.08 11.35-9.08-11.35z"></path></svg>
<!-- Battery -->
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24"><rect height="10" rx="2" ry="2" width="16" x="2" y="7"></rect><line x1="22" x2="22" y1="11" y2="13"></line></svg>
</div>
</div>
<!-- END: iOS Status Bar Simulation -->
<!-- BEGIN: Top Header -->
<header class="flex justify-between items-center px-6 py-2 sticky top-[38px] z-40 bg-[#fcfcfd]/90 backdrop-blur-md">
<!-- Logo -->
<div class="flex items-center gap-2">
<div class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center p-1.5">
<div class="w-full h-full rounded-full border-[1.5px] border-white flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-white rounded-full"></div>
</div>
</div>
<span class="text-xl font-bold tracking-tight text-gray-900">Orivon</span>
</div>
<!-- Menu Button -->
<button aria-label="Menu" class="p-2 -mr-2 text-gray-600 hover:text-gray-900">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24">
<line x1="3" x2="21" y1="12" y2="12"></line>
<line x1="3" x2="21" y1="6" y2="6"></line>
<line x1="3" x2="21" y1="18" y2="18"></line>
</svg>
</button>
</header>
<!-- END: Top Header -->
<!-- BEGIN: Main Content -->
<main class="px-5 py-4 flex flex-col gap-8">
<!-- BEGIN: Greeting Section -->
<section data-purpose="greeting">
<h1 class="text-[22px] font-bold text-gray-900 flex items-center gap-2">
          Good morning, Rahul <span class="text-xl">👋</span>
</h1>
<p class="text-[13px] text-gray-500 mt-1 font-medium">You have <span class="text-gray-900 font-semibold">3</span> meetings today.</p>
</section>
<!-- END: Greeting Section -->
<!-- BEGIN: Stats Grid -->
<section class="grid grid-cols-2 gap-3" data-purpose="stats-cards">
<!-- Card 1: Meetings -->
<div class="bg-white rounded-[20px] p-4 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-gray-100/50 flex flex-col relative overflow-hidden">
<div class="flex justify-between items-start mb-2">
<span class="text-3xl font-bold text-gray-900">12</span>
<div class="w-6 h-6 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-500">
<svg fill="none" height="12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="12"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
</div>
</div>
<div>
<p class="text-[13px] font-semibold text-gray-900">Meetings</p>
<p class="text-[11px] text-gray-400 font-medium">This Week</p>
</div>
</div>
<!-- Card 2: Action Items -->
<div class="bg-white rounded-[20px] p-4 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-gray-100/50 flex flex-col relative overflow-hidden">
<div class="flex justify-between items-start mb-2">
<span class="text-3xl font-bold text-gray-900">3</span>
<div class="w-6 h-6 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-500">
<svg fill="none" height="12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24" width="12"><polyline points="20 6 9 17 4 12"></polyline></svg>
</div>
</div>
<div>
<p class="text-[13px] font-semibold text-gray-900">Action Items</p>
<p class="text-[11px] text-gray-400 font-medium">Due Today</p>
</div>
</div>
</section>
<!-- END: Stats Grid -->
<!-- BEGIN: Continue Section -->
<section data-purpose="continue-watching">
<h2 class="text-[14px] font-bold text-gray-900 mb-3 ml-1">Continue</h2>
<div class="bg-white rounded-[24px] p-4 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-gray-100 flex items-center justify-between gap-4">
<div class="flex-1 min-w-0">
<h3 class="text-[14px] font-bold text-gray-900 truncate">Q3 Product Strategy Sync</h3>
<p class="text-[12px] text-gray-500 font-medium mt-0.5">18:42 · Yesterday</p>
<!-- Progress Bar -->
<div class="mt-3 flex items-center gap-3">
<div class="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-indigo-500 to-violet-600 rounded-full" style="width: 65%;"></div>
</div>
<span class="text-[10px] text-gray-400 font-medium shrink-0">12:28 / 18:42</span>
</div>
</div>
<!-- Play Button -->
<button class="w-12 h-12 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white shrink-0 shadow-md shadow-indigo-200">
<svg class="ml-1" fill="currentColor" height="20" viewbox="0 0 24 24" width="20"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
</button>
</div>
</section>
<!-- END: Continue Section -->
<!-- BEGIN: Recent Section -->
<section data-purpose="recent-meetings">

<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
</div>
<!-- Content -->
<div class="flex-1 min-w-0 pt-0.5">
<h3 class="text-[14px] font-bold text-gray-900 truncate">Q3 Product Strategy Sync</h3>
<p class="text-[12px] text-gray-500 font-medium mt-0.5">Yesterday · 18:42</p>
<!-- Tag & Avatars Row -->
<div class="flex justify-between items-center mt-3">
<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-semibold bg-indigo-50 text-indigo-600">
                  Work
                </span>
<!-- Overlapping Avatars -->
<div class="flex -space-x-2">
<img alt="Attendee 1" class="w-6 h-6 rounded-full border-2 border-white object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_YxYtm3z0ZYHZrOKgk8R4lMn6mCnkknOMY__T0SgonDLvk7UiTPbmMh6EzjpG1l3JZ5t6jsUjMXSg9ML70FErp1PyxYNoBtKPmeB19kRRcqjz9xL-A7DJ1jMcz0kNcbc21wH1NcVyGbtUXAJvJoSeyeuEzZK6auJDWGXcCZQlm9qs2eX8_YyYjP287NRH9rahSI5RYbNWmIZAOjNLCNAK2-z-If6mo5cghxC8VRkeWbT0R7ftT1abWON4F944S5Nlom1u-lt-o9o"/>
<img alt="Attendee 2" class="w-6 h-6 rounded-full border-2 border-white object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaMJ8KPlRospSycCnXm5sHhznkEG1Klt3daCHHWM7T71YV5PMpIckbe8tAN1iF6P-tfqFefdJz1AI7wdUuOGyRnJwyzAZBc0rT-9XjHSf_xmiPOeblRc-b05zxsrBJiHgUFrOo7n1y4a7BAy8EMjimSnxja1o0aVCL_FWN934Rsb8sUeGQ-JeVRVwuUPOybKV6Km3F1Kg0isIffPn7B2Tl6taoqrSMlopTE8jJtyk2tkdHRHwv7DjtKZIXyBCXhkp-eFbrSW5u2-k"/>
<img alt="Attendee 3" class="w-6 h-6 rounded-full border-2 border-white object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4xScspmDlRVhxpFgIPH-DGmkjGh44tNDuswbMTU3C7l1BLombSmt4c_rnQvpaadqducoBBiU14zv8dpS8aoz1yLL9kjBIQvjjySXA99chK1zSzoKvnTza2cZgy-X-VffgMWz6spCezO60qWYbhDZdwebFmPb5wVPsBmu0mJXVKkStP6aJJm88kzj47v06yAdnSMGtKAndnIK-mpkBQAdS3Wnur4Xd-nL373mmMEpAHedO0arVlQd7h8xKBoySmt370SehE48S1Pg"/>
<div class="w-6 h-6 rounded-full border-2 border-white bg-gray-100 flex items-center justify-center text-[9px] font-bold text-gray-500">
                    +6
                  </div>
</div>
</div>
</div>
</div>
<!-- Additional dummy item just to fill out space like a real app -->
<div class="bg-white rounded-[24px] p-4 shadow-[0_2px_10px_-4px_rgba(0,0,0,0.05)] border border-gray-100 flex gap-4 items-start opacity-70">
<div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600 shrink-0">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
</div>
<div class="flex-1 min-w-0 pt-0.5">
<h3 class="text-[14px] font-bold text-gray-900 truncate">Design Review - Orivon v2</h3>
<p class="text-[12px] text-gray-500 font-medium mt-0.5">May 25 · 16:11</p>
</div>
</div>
</div>
</section>
<!-- END: Recent Section -->
</main>
<!-- END: Main Content -->
<!-- BEGIN: Floating Action Button (FAB) -->
<button aria-label="New Record" class="absolute bottom-[96px] right-5 w-[56px] h-[56px] bg-gradient-to-br from-indigo-500 to-violet-600 rounded-[20px] flex items-center justify-center text-white shadow-lg shadow-indigo-200/50 z-30 transition-transform active:scale-95">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="24"><line x1="12" x2="12" y1="5" y2="19"></line><line x1="5" x2="19" y1="12" y2="12"></line></svg>
</button>
<!-- END: Floating Action Button (FAB) -->
<!-- BEGIN: Bottom Navigation -->
<nav class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-100 px-6 py-4 pb-8 flex justify-between items-center z-20 rounded-b-[40px]">
<!-- Home (Active) -->
<button class="flex flex-col items-center gap-1 text-indigo-600 px-4">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>

<!-- AI Copilot -->

</button>
<!-- Settings/Profile -->
<button class="flex flex-col items-center gap-1 text-gray-400 hover:text-gray-600 px-4">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>

</div>
<!-- END: Mobile App Container -->
