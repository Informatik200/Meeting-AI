[tool.ruff]
line-length = 120
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/conftest.py" = ["E402"]



[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
env = [
    "GEMINI_API_KEY=",
    "DATABASE_URL=sqlite:///:memory:",
    "WHISPER_MODEL_SIZE=tiny",
]
