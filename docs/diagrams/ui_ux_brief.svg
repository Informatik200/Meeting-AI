<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220">
  <rect width="100%" height="100%" fill="#0A0A0A"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#FFFFFF"/>
    </marker>
  </defs>
  <path d="M 180 110 L 220 110" stroke="#FFFFFF" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="200.0" y="102.0" fill="#E8E6E1" font-family="sans-serif" font-size="11" text-anchor="middle">Select</text>
  <path d="M 420 110 L 460 110" stroke="#FFFFFF" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="440.0" y="102.0" fill="#E8E6E1" font-family="sans-serif" font-size="11" text-anchor="middle">Grounds</text>
  <rect x="50" y="50" width="130" height="120" rx="8" ry="8" fill="#121212" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="115.0" y="90.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Column 1: Sidebar Rail</text>
  <text x="115.0" y="106.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">- Nav links (Home, Search)</text>
  <text x="115.0" y="122.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">- Account settings</text>
  <text x="115.0" y="138.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">(240px width)</text>
  <rect x="220" y="50" width="200" height="120" rx="8" ry="8" fill="#121212" stroke="#C8F135" stroke-width="1.5"/>
  <text x="320.0" y="90.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Column 2: Workspace Sheet</text>
  <text x="320.0" y="106.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">- Title (inline editable)</text>
  <text x="320.0" y="122.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">- Tabs: Overview / Transcribe</text>
  <text x="320.0" y="138.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">(720px max reading width)</text>
  <rect x="460" y="50" width="130" height="120" rx="8" ry="8" fill="#121212" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="525.0" y="90.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Column 3: AI Helper</text>
  <text x="525.0" y="106.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">- Chat input console</text>
  <text x="525.0" y="122.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">- Quick actions grid</text>
  <text x="525.0" y="138.0" fill="#E8E6E1" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">(320px width)</text>
</svg>