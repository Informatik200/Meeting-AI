version: '3.9'

# Production Docker Compose - use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# Overrides development settings with production defaults

services:
  postgres:
    # Production postgres should use volumes and backups
    restart: always
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password

  backend:
    restart: always
    # Override with production command (no reload)
    command: >
      sh -c "
      uvicorn app.main:app 
      --host 0.0.0.0 
      --port 8000 
      --workers 4 
      --timeout-keep-alive 65 
      --timeout-notify 30
      "
    environment:
      LOG_LEVEL: INFO
      COOKIE_SECURE: "true"
    # Production should use environment file
    env_file:
      - .env.production
    # Don't mount source code
    volumes: []
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  frontend:
    restart: always
    # Don't mount source code
    volumes: []
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Production-only: nginx reverse proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: meeting-ai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - meeting-ai-network

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
